<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css"
      integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="calculator">
      <div class="screen">
        <button><i class="fa-solid fa-up-down" id="mode"></i></button>
        <input type="text" placeholder="0" class="input" id="display" />
      </div>
      <div class="buttons">
        <button class="operator" id="clear">AC</button>
        <button class="operator" id="delete">
          <i class="fa-solid fa-delete-left"></i>
        </button>
        <button class="operator" id="parentage">%</button>
        <button class="sign" class="÷">÷</button>
        <button class="num" value="7">7</button>
        <button class="num" value="8">8</button>
        <button class="num" value="9">9</button>
        <button class="sign" value="x">x</button>
        <button class="num" value="4">4</button>
        <button class="num" value="5">5</button>
        <button class="num" value="6">6</button>
        <button class="sign" value="-">-</button>
        <button class="num" value="1">1</button>
        <button class="num" value="2">2</button>
        <button class="num" value="3">3</button>
        <button class="sign" value="+">+</button>
        <button class="last" id="zero" value="0">0</button>
        <button class="last" id="decimal">.</button>
        <button class="last sign" id="equal">=</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
